<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediSlot Doctor Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">MediSlot</h2>

        <ul class="menu">
            <li class="active">Dashboard</li>
            <li>Appointments</li>
            <li>Patients</li>
            <li>Prescriptions</li>
            <li>Locations</li>
            <li>Settings</li>
        </ul>
    </aside>

    <!-- MAIN AREA -->
    <main class="main">

        <!-- TOP BAR -->
        <header class="topbar">
            <h1>Good Evening, Doctor</h1>

            <input type="text" placeholder="Search patient..." class="search">

            <div class="profile">
                <img src="assets/profile.png">
            </div>
        </header>

        <!-- CONTENT -->
        <section class="content">

            <div class="card">
                <h3>Today's Appointments</h3>
                <p>18 Patients Scheduled</p>
            </div>

            <div class="card">
                <h3>Pending Requests</h3>
                <p>5 Waiting Approval</p>
            </div>

            <div class="card">
                <h3>Clinic Location</h3>
                <p>Indiranagar (4PM - 7PM)</p>
            </div>

            <div class="card">
                <h3>Recent Patient</h3>
                <p>Ramesh Kumar - Fever</p>
            </div>

        </section>

    </main>
</div>

</body>
</html>
