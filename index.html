<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediSlot Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2 class="logo">MediSlot</h2>
        <ul class="menu">
            <li class="active">Dashboard</li>
            <li>Appointments</li>
            <li>Patients</li>
            <li>Prescriptions</li>
            <li>Locations</li>
            <li>Settings</li>
        </ul>
    </aside>

    <!-- Main -->
    <main class="main">

        <header class="topbar">
            <h1>Good Evening, Doctor</h1>
            <input type="text" placeholder="Search patient..." class="search">
            <div class="profile">
                <img src="assets/profile.png">
            </div>
        </header>

        <!-- DASHBOARD CONTENT -->
        <section class="dashboard">

            <!-- LEFT -->
            <div class="left-panel">

                <div class="card large" id="pendingRequests">
                    <h2>Pending Appointment Requests</h2>
                </div>

                <div class="card large">
                    <h2>Today's Patients</h2>
                    <table class="patient-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Time</th>
                                <th>Issue</th>
                            </tr>
                        </thead>
                        <tbody id="todayPatients"></tbody>
                    </table>
                </div>

            </div>

            <!-- RIGHT -->
            <div class="right-panel">

                <div class="stat">
                    <h3>Today's Load</h3>
                    <p class="big" id="patientCount">0 Patients</p>
                </div>

                <div class="stat">
                    <h3>Pending Requests</h3>
                    <p class="big" id="pendingCount">0 Waiting</p>
                </div>

                <div class="stat">
                    <h3>Clinic Location</h3>
                    <img src="assets/map_pin.png" class="pin">
                    <p>Indiranagar 4PM-7PM</p>
                </div>

            </div>

        </section>

    </main>

</div>

<!-- JS (separate clean link) -->
<script src="js/app.js"></script>

</body>
</html>
